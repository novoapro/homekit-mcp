<!-- Sidebar (desktop persistent + mobile overlay) -->
<app-sidebar
  [isOpen]="sidebarOpen()"
  [collapsed]="sidebarCollapsed()"
  (closed)="sidebarOpen.set(false)"
  (collapseToggled)="toggleSidebarCollapse()"
/>

<!-- Content wrapper: handles sidebar offset and stacks topbar above content -->
<div class="content-wrapper"
     [class.sidebar-expanded]="!sidebarCollapsed()"
     [class.sidebar-collapsed]="sidebarCollapsed()">

  <!-- Top bar (always visible) -->
  <header class="app-topbar">
    <!-- Right: connection status indicators -->
    <div class="topbar-right">
      <!-- WebSocket status -->
      @if (config.websocketEnabled()) {
        <div class="status-chip"
             [class.status-ok]="wsService.connectionState() === 'connected'"
             [class.status-warn]="wsService.connectionState() === 'connecting'"
             [class.status-err]="wsService.connectionState() === 'disconnected'">
          <span class="status-chip-label">Server </span>
          <div class="status-dot"
               [class.connected]="wsService.connectionState() === 'connected'"
               [class.connecting]="wsService.connectionState() === 'connecting'">
          </div>
        </div>
      }

      <!-- Last poll time -->
      @if (polling.lastPollTime()) {
        <div class="status-chip time-update">
          <span class="status-chip-label">Updated: {{ polling.lastPollTime()!.toLocaleTimeString() }}</span>
        </div>
      }
    </div>
    <!-- Left: mobile-only controls + page title -->
    <div class="topbar-left">
      <button class="hamburger-btn" (click)="sidebarOpen.set(true)">
        <app-icon name="menu" [size]="20" />
      </button>
      <img src="logo.svg" alt="HomeKit MCP" class="topbar-logo" />
      <span class="topbar-title">{{ topBar.title() }}</span>
      @if (topBar.badge(); as badge) {
        <span class="topbar-badge">{{ badge }}</span>
      }
      @if (topBar.showLoading()) {
        <span class="topbar-loading-dot"></span>
      }
    </div>
  </header>

  <!-- Main content -->
  <main class="app-content"
        [@routeAnimation]="outlet.isActivated ? outlet.activatedRoute.url : ''">
    <router-outlet #outlet="outlet" />
  </main>
</div>
