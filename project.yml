name: CompAI-Home
options:
  bundleIdPrefix: com.mnplab
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

configs:
  Dev Debug: debug
  Dev Release: release
  Prod Debug: debug
  Prod Release: release

packages:
  Vapor:
    url: https://github.com/vapor/vapor.git
    from: "4.89.0"

schemes:
  CompAI-Home:
    build:
      targets:
        CompAI-Home: all
        CompAI-HomeTests: [test]
    run:
      config: Dev Debug
    test:
      config: Dev Debug
      targets:
        - CompAI-HomeTests
  CompAI-Home-Prod:
    build:
      targets:
        CompAI-Home: all
    run:
      config: Prod Debug

targets:
  CompAI-Home:
    type: application
    platform: iOS
    supportedDestinations: [macCatalyst]
    sources:
      - CompAI-Home
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mnplab.compai-home
        PRODUCT_NAME: CompAI-Home
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        SUPPORTS_MACCATALYST: "YES"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
        INFOPLIST_FILE: CompAI-Home/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: CompAI-Home/Resources/CompAI-Home.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KT7JRD4C5Y
        ENABLE_HARDENED_RUNTIME: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Dev Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG DEV_ENVIRONMENT
        Dev Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEV_ENVIRONMENT
        Prod Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Prod Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    dependencies:
      - package: Vapor
      - target: MenuBarPlugin
    entitlements:
      path: CompAI-Home/Resources/CompAI-Home.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.homekit: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.mnplab.compai-home
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  CompAI-HomeTests:
    type: bundle.unit-test
    platform: iOS
    supportedDestinations: [macCatalyst]
    sources:
      - CompAI-HomeTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mnplab.compai-home-tests
        SWIFT_VERSION: "5.9"
        SUPPORTS_MACCATALYST: "YES"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
        DEVELOPMENT_TEAM: KT7JRD4C5Y
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: CompAI-Home

  MenuBarPlugin:
    type: bundle
    platform: macOS
    sources:
      - MenuBarPlugin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mnplab.compai-home.MenuBarPlugin
        PRODUCT_NAME: MenuBarPlugin
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: MenuBarPlugin/Info.plist
        SKIP_INSTALL: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KT7JRD4C5Y
        COMBINE_HIDPI_IMAGES: "YES"
